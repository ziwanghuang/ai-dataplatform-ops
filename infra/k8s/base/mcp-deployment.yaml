# MCP Gateway Deployment — Go MCP Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-gateway
  namespace: aiops-production
  labels:
    app.kubernetes.io/name: mcp-gateway
    app.kubernetes.io/part-of: aiops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-gateway
  template:
    metadata:
      labels:
        app: mcp-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: agent-sa
      terminationGracePeriodSeconds: 30
      containers:
        - name: mcp
          image: registry.internal/aiops/mcp-server:latest
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: CONFIG_PATH
              value: "/etc/aiops/configs/production.yaml"
            - name: OTEL_SERVICE_NAME
              value: "mcp-gateway"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger-collector:4317"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
