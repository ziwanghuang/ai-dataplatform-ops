# Kustomize base — 所有环境共享的 K8s 资源
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - agent-deployment.yaml
  - mcp-deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - network-policy.yaml
  - serviceaccount.yaml
  - pdb.yaml
  - configmap.yaml

commonLabels:
  app.kubernetes.io/part-of: aiops
  app.kubernetes.io/managed-by: kustomize

commonAnnotations:
  team: "aiops-platform"
