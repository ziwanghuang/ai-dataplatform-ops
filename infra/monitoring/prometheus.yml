# Prometheus 配置 — 采集 Agent + MCP + 基础设施指标
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Agent Service (Python FastAPI)
  - job_name: "agent-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["agent-service:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # MCP Gateway (Go Fiber)
  - job_name: "mcp-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["mcp-gateway:3000"]

  # PostgreSQL Exporter
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Redis Exporter
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  # Elasticsearch Exporter
  - job_name: "elasticsearch"
    static_configs:
      - targets: ["es-exporter:9114"]

  # Node Exporter (主机指标)
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
