# Docker Compose — 本地开发环境
# 使用: make dev-up 或 docker compose -f infra/docker/docker-compose.dev.yml up -d

services:
  # PostgreSQL — 业务数据 + LangGraph Checkpoint + 审计日志
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: aiops
      POSTGRES_DB: aiops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiops"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis — 缓存 + 消息队列 + HITL 审批状态
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Elasticsearch — 日志检索 + BM25 稀疏检索
  elasticsearch:
    image: elasticsearch:8.14.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Milvus — 向量数据库（Dense Retrieval）
  milvus:
    image: milvusdb/milvus:v2.4-latest
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Neo4j — 知识图谱（Graph-RAG）
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"  # HTTP Browser
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Jaeger — 分布式追踪 (OTel Collector)
  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # LangFuse — LLM 追踪与评估
  langfuse:
    image: langfuse/langfuse:latest
    environment:
      DATABASE_URL: postgresql://aiops:aiops@postgres:5432/langfuse
      NEXTAUTH_SECRET: dev-secret-do-not-use-in-production
      NEXTAUTH_URL: http://localhost:3001
      SALT: dev-salt
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # Prometheus — 指标采集
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro

  # Grafana — 可视化 Dashboard
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  postgres_data:
  es_data:
  milvus_data:
  neo4j_data:
