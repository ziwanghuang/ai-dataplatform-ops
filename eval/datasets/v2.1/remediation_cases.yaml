# 修复评估数据集 v2.1
# 评估 Remediation Agent 的修复方案质量：安全性、回滚方案、步骤完整性

- id: REM001
  input:
    query: "NameNode heap 使用率 95%，需要处理"
    request_type: "user_query"
    context:
      component: "hdfs"
      root_cause: "NameNode JVM heap 不足"
  expected:
    remediation_safe: true
    has_rollback: true
    risk_level: "medium"
    steps_min: 2
  tags: ["hdfs", "heap", "remediation"]

- id: REM002
  input:
    query: "需要重启 DataNode-01"
    request_type: "user_query"
    context:
      component: "hdfs"
      target: "datanode-01"
  expected:
    remediation_safe: true
    has_rollback: true
    risk_level: "high"
    requires_approval: true
    steps_min: 3
  tags: ["hdfs", "restart", "high_risk"]

- id: REM003
  input:
    query: "Kafka consumer lag 过高，需要增加分区数"
    request_type: "user_query"
    context:
      component: "kafka"
      root_cause: "分区数不足导致消费并行度不够"
  expected:
    remediation_safe: true
    risk_level: "medium"
    steps_min: 2
  tags: ["kafka", "partition", "remediation"]

- id: REM004
  input:
    query: "ES 索引分片数需要调整"
    request_type: "user_query"
    context:
      component: "es"
      root_cause: "分片数过多导致性能下降"
  expected:
    remediation_safe: true
    risk_level: "medium"
    steps_min: 2
  tags: ["es", "shard", "remediation"]

- id: REM005
  input:
    query: "需要停掉 NameNode 做维护"
    request_type: "user_query"
    context:
      component: "hdfs"
      operation: "namenode_stop"
  expected:
    remediation_safe: true
    has_rollback: true
    risk_level: "critical"
    requires_approval: true
